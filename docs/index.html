<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsurTech Intelligence</title>
  <meta name="description" content="Global insurtech news, AI-powered summaries, updated every 6 hours." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      line-height: 1.6;
    }
    header {
      background: #1a1a2e;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: .5rem; color: #a0aec0; font-size: .95rem; }
    .updated  { margin-top: .75rem; font-size: .8rem; color: #718096; }
    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.25rem;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      border: 1px solid #e2e8f0;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .card-meta  { font-size: .78rem; color: #718096; margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .5px; }
    .card-title { font-size: 1.15rem; font-weight: 600; margin-bottom: .75rem; line-height: 1.4; }
    .card-title a { color: #1a1a2e; text-decoration: none; }
    .card-title a:hover { color: #4a6fa5; }
    .card-summary { font-size: .92rem; color: #4a5568; margin-bottom: 1rem; }
    .card-link  { font-size: .85rem; color: #4a6fa5; font-weight: 500; text-decoration: none; }
    .card-link:hover { text-decoration: underline; }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: .82rem;
      color: #a0aec0;
    }
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>InsurTech Intelligence</h1>
    <p>Global insurtech news · AI-powered summaries · 0 articles</p>
    <div class="updated">Updated Mar 26, 2026 at 11:59 UTC</div>
  </header>

  <main>
    <p style="text-align:center;color:#718096;padding:3rem">No articles yet. Check back soon.</p>
  </main>

  <footer>
    InsurTech Intelligence · Powered by AI · Updated every 6 hours
  </footer>
</body>
</html>
